# GPT-5.6 / Multi-Agent V2 reste instable : les sous-agents peuvent heriter du
# modele/effort du parent et ont deja consomme du tier Fast sans demande explicite.
# Le mode multi-agent et Fast sont donc bloques au niveau du harness, pas seulement
# par instructions. Reevaluer quand openai/codex#29940, #30407, #31814 et #32031
# seront corriges et verifies sur une release Codex.
model = "gpt-5.6-terra"
model_reasoning_effort = "max"
personality = "pragmatic"
approval_policy = "never"
sandbox_mode = "danger-full-access"
notify = ["/bin/sh", "-lc", 'exec "$HOME/.codex/scripts/notify-sound.sh"']

[tui]
notifications = true
status_line = ["model-with-reasoning", "five-hour-limit", "weekly-limit", "context-window-size", "context-remaining", "current-dir", "git-branch", "task-progress"]
status_line_use_colors = true

[desktop]
conversationDetailMode = "STEPS_COMMANDS"
ambient-suggestions-enabled = false
followUpQueueMode = "queue"
dock-icon-preference = "app-default"
appearanceLightCodeThemeId = "gruvbox"
selected-avatar-id = "hoots"
show-context-window-usage = true
git-pull-request-merge-method = "squash"

[desktop.open-in-target-preferences]
global = "ghostty"

[desktop.appearanceLightChromeTheme]
accent = "#458588"
contrast = 45
ink = "#3c3836"
opaqueWindows = false
surface = "#fbf1c7"

[desktop.appearanceLightChromeTheme.semanticColors]
diffAdded = "#3c3836"
diffRemoved = "#cc241d"
skill = "#b16286"

# Volume / taches mecaniques : `codex --profile luna` (ou /profile dans le TUI).
[profiles.luna]
model = "gpt-5.6-luna"
model_reasoning_effort = "max"

# Escalade (archi, security, debug dur) : `codex --profile sol`.
[profiles.sol]
model = "gpt-5.6-sol"
model_reasoning_effort = "high"

[features]
# Garde-fous runtime : ne pas laisser le modele ou le harness lancer des workers
# tant que le routing et l'heritage du service tier ne sont pas fiables.
multi_agent = false
multi_agent_v2 = false
fast_mode = false
memories = true

[memories]
generate_memories = true
use_memories = true

[marketplaces.Mixedbread-Grep]
source_type = "git"
source = "https://github.com/mixedbread-ai/mgrep.git"

[marketplaces.claude-plugins-official]
source_type = "git"
source = "https://github.com/anthropics/claude-plugins-official.git"

[marketplaces.ponytail]
source_type = "git"
source = "https://github.com/DietrichGebert/ponytail.git"
ref = "main"

[plugins."mgrep@Mixedbread-Grep"]
enabled = true

[plugins."clangd-lsp@claude-plugins-official"]
enabled = true

[plugins."claude-code-setup@claude-plugins-official"]
enabled = true

[plugins."claude-md-management@claude-plugins-official"]
enabled = true

[plugins."context7@claude-plugins-official"]
enabled = true

[plugins."frontend-design@claude-plugins-official"]
enabled = true

[plugins."playwright@claude-plugins-official"]
enabled = true

[plugins."pyright-lsp@claude-plugins-official"]
enabled = true

[plugins."rust-analyzer-lsp@claude-plugins-official"]
enabled = true

[plugins."security-guidance@claude-plugins-official"]
enabled = false

[plugins."skill-creator@claude-plugins-official"]
enabled = true

[plugins."superpowers@claude-plugins-official"]
enabled = true

[plugins."typescript-lsp@claude-plugins-official"]
enabled = true

[plugins."ponytail@ponytail"]
enabled = true

[projects."/Users/cyril/src/codex-config"]
trust_level = "trusted"

[projects."/Users/cyril/src/lotusim-lab"]
trust_level = "trusted"
