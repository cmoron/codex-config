# Le multi-agent est actif, mais Fast reste desactive. Les sous-agents ordinaires
# utilisent Terra @ high; le travail critique est explicitement route vers Sol.
#
# Sol @ xhigh orchestre, conçoit l'architecture et tranche les choix techniques
# dimensionnants ou pointus.
# Reserver max aux blocages reels, jamais comme cout fixe de chaque session.
model = "gpt-5.6-sol"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
approval_policy = "never"
sandbox_mode = "danger-full-access"
notify = ["/bin/sh", "-lc", 'exec "$HOME/.codex/scripts/notify-sound.sh"']

[tui]
notifications = true
status_line = ["model-with-reasoning", "five-hour-limit", "weekly-limit", "context-window-size", "context-remaining", "current-dir", "git-branch", "task-progress"]
status_line_use_colors = true

[desktop]
conversationDetailMode = "STEPS_COMMANDS"
ambient-suggestions-enabled = false
followUpQueueMode = "queue"
dock-icon-preference = "app-default"
appearanceLightCodeThemeId = "gruvbox"
selected-avatar-id = "hoots"
show-context-window-usage = true
git-pull-request-merge-method = "squash"

[desktop.open-in-target-preferences]
global = "ghostty"

[desktop.appearanceLightChromeTheme]
accent = "#458588"
contrast = 45
ink = "#3c3836"
opaqueWindows = false
surface = "#fbf1c7"

[desktop.appearanceLightChromeTheme.semanticColors]
diffAdded = "#3c3836"
diffRemoved = "#cc241d"
skill = "#b16286"

# Implementation bornee / travail quotidien moins cher : `codex --profile terra`.
[profiles.terra]
model = "gpt-5.6-terra"
model_reasoning_effort = "high"

# Volume / taches mecaniques : `codex --profile luna`.
[profiles.luna]
model = "gpt-5.6-luna"
model_reasoning_effort = "high"

# Repli Sol moins couteux : `codex --profile sol-high`.
[profiles.sol-high]
model = "gpt-5.6-sol"
model_reasoning_effort = "high"

[agents]
enabled = true
default_subagent_model = "gpt-5.6-terra"
default_subagent_reasoning_effort = "high"

[features]
# Les agents sont disponibles; Fast reste un choix explicite separe.
multi_agent = true
multi_agent_v2 = true
fast_mode = false
memories = true
# Superpowers vient du catalogue distant OpenAI. Ne pas l'installer localement :
# les deux sources se masquent et le snapshot OpenAI local est plus ancien.
remote_plugin = true

[memories]
generate_memories = true
use_memories = true

[marketplaces.claude-plugins-official]
source_type = "git"
source = "https://github.com/anthropics/claude-plugins-official.git"

[marketplaces.ponytail]
source_type = "git"
source = "https://github.com/DietrichGebert/ponytail.git"
ref = "main"

[plugins."clangd-lsp@claude-plugins-official"]
enabled = true

[plugins."claude-code-setup@claude-plugins-official"]
enabled = true

[plugins."claude-md-management@claude-plugins-official"]
enabled = true

[plugins."context7@claude-plugins-official"]
enabled = true

[plugins."frontend-design@claude-plugins-official"]
enabled = true

[plugins."playwright@claude-plugins-official"]
enabled = true

[plugins."pyright-lsp@claude-plugins-official"]
enabled = true

[plugins."rust-analyzer-lsp@claude-plugins-official"]
enabled = true

[plugins."security-guidance@claude-plugins-official"]
enabled = false

[plugins."skill-creator@claude-plugins-official"]
enabled = true

[plugins."typescript-lsp@claude-plugins-official"]
enabled = true

[plugins."ponytail@ponytail"]
enabled = true

[projects."/Users/cyril/src/codex-config"]
trust_level = "trusted"

[projects."/Users/cyril/src/lotusim-lab"]
trust_level = "trusted"

[projects."/home/cyril/src/LOTUSim"]
trust_level = "trusted"
